run_name: smoke-test
seed: 6198
dry_run: false

model:
  d_model: 512
  n_heads: 16
  n_layers: 8
  mlp_ratio: 8
  alibi: true
  alibi_bias_max: 8.0
  flash_attention: false
  attention_dropout: 0.0
  attention_layer_norm: false
  multi_query_attention: true
  block_type: sequential
  layer_norm_type: low_precision
  activation_type: gelu
  residual_dropout: 0.0
  embedding_dropout: 0.0
  max_sequence_length: 2048
  include_bias: true

  vocab_size: 50277
  embedding_size: 50304
  eos_token_id: 50276
  pad_token_id: 50276
  init_device: meta
  init_std: 0.02

optimizer:
  name: adamw
  learning_rate: 1.0e-3
  weight_decay: 0.01
  betas:
  - 0.9
  - 0.95

scheduler:
  name: cosine_with_warmup
  t_warmup: 2
  alpha_f: 0.1

data:
  paths:
  - /mnt/data/noahcylich/data/smoke-test/train_00000.npy
  pad_direction: right
  num_workers: 0
  drop_last: true
  pin_memory: true
  prefetch_factor: null
  persistent_workers: false
  timeout: 0

tokenizer:
  identifier: EleutherAI/gpt-neox-20b
  truncate_direction: right

save_folder: /mnt/data/noahcylich/checkpoints/smoke-test
save_overwrite: true
save_interval: 1000000
save_num_checkpoints_to_keep: 0
save_interval_unsharded: null
save_num_unsharded_checkpoints_to_keep: 0

load_path: null

max_duration: 5
global_train_batch_size: 8
device_train_microbatch_size: 8

precision: amp_bf16

max_grad_norm: 1.0

speed_monitor:
  window_size: 5

console_log_interval: 1
matformer_factor: 8

eval_interval: 1000000
eval_subset_num_batches: 0
device_eval_batch_size: 8
evaluators: []
