run_name: matformer-tiny-17M-long
seed: 6198
dry_run: false

model:
  d_model: 256
  n_heads: 8
  n_layers: 4
  mlp_ratio: 8
  alibi: true
  alibi_bias_max: 8.0
  flash_attention: false
  attention_dropout: 0.0
  attention_layer_norm: false
  multi_query_attention: true
  block_type: sequential
  layer_norm_type: low_precision
  activation_type: gelu
  residual_dropout: 0.0
  embedding_dropout: 0.0
  max_sequence_length: 2048
  include_bias: true

  vocab_size: 50277
  embedding_size: 50304
  eos_token_id: 50276
  pad_token_id: 50276
  init_device: meta
  init_std: 0.02

optimizer:
  name: adamw
  learning_rate: 1.0e-3
  weight_decay: 0.01
  betas:
  - 0.9
  - 0.95

scheduler:
  name: cosine_with_warmup
  t_warmup: 200
  alpha_f: 0.1

data:
  paths: ${path.glob:/mnt/data/noahcylich/data/pile-700M/train/*.npy}
  pad_direction: right
  num_workers: 2
  drop_last: true
  pin_memory: true
  prefetch_factor: 4
  persistent_workers: true
  timeout: 0

tokenizer:
  identifier: EleutherAI/gpt-neox-20b
  truncate_direction: right

save_folder: /mnt/data/noahcylich/checkpoints/matformer-tiny-17M-long
save_overwrite: true
save_interval: 10000000
save_num_checkpoints_to_keep: 0
save_interval_unsharded: 2700
save_num_unsharded_checkpoints_to_keep: 2

load_path: null

max_duration: 2700
global_train_batch_size: 128
device_train_microbatch_size: 16

precision: amp_bf16

max_grad_norm: 1.0

speed_monitor:
  window_size: 20

console_log_interval: 50
matformer_factor: 8

eval_interval: 500
eval_subset_num_batches: 20
device_eval_batch_size: 16
evaluators:
  - label: pile-val
    subset_num_batches: 20
    data:
      paths: ${path.glob:/mnt/data/noahcylich/data/pile-700M/val/*.npy}
      num_workers: 2
      drop_last: true
      pin_memory: true
      persistent_workers: true
      prefetch_factor: 4
